# i3status configuration file.
# see "man i3status" for documentation.

# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!

general {
        output_format = "i3bar"
        colors = true
        interval = 30
}

#order += "ipv6"
# order += "wireless _first_"
#order += "ethernet _first_"
order += "battery all"
# order += "disk /"
order += "load"
order += "memory"
order += "volume master"
order += "tztime local"

wireless _first_ {
        format_up = "%essid"
        format_down = "down"
        separator = false
        color_good = "#98971a"
}

ethernet _first_ {
        format_up = "E: %ip (%speed)"
        format_down = "E: down"
        separator = false
}

battery all {
        format = "%status %percentage"
        integer_battery_capacity = true
        format_down = "No battery"
        status_chr = "⚡"
        status_bat = "🔋"
        status_unk = "?"
        status_full = "☻ "
        separator = true
}

disk "/" {
        format = "%avail"
        separator = false
}

load {
        format = "%1min"
        separator = true
}

memory {
        format = "%available"
        threshold_degraded = "2G"
        format_degraded = "MEMORY < %available"
        separator = true
}

tztime local {
        format = "%d/%m/%y %H:%M"
        # format = "%d/%m/%y"
        separator = true
}

volume master {
        format = "V: %volume"
        format_muted = "V: (%volume)"
        device = "default"
        mixer = "Master"
        mixer_idx = 0
        separator = true
}
